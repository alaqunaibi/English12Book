<title>Responsive HTML5 Page</title>
<style>
  /* Basic reset and font styling */
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    line-height: 1.6;
    background-color: #f0f0f0;
    color: #333;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 20px;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    margin: 10px 0;
  }

  a {
    display: block; /* Make links block for easier clicking */
    padding: 10px;
    background-color: #fff;
    border-radius: 4px;
    text-decoration: none;
    color: #007BFF;
    font-size: 1em;
    transition: background-color 0.3s;
  }

  a:hover {
    background-color: #e0e0e0;
  }

  /* Responsive font sizes for smaller screens */
  @media (max-width: 600px) {
    h1 {
      font-size: 1.5em;
    }

    a {
      font-size: 1.2em;
    }
  }
</style>

</head>
